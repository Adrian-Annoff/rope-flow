<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ROPE FLOW</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rope Flow">
<meta name="theme-color" content="#FFD60A">
<link rel="apple-touch-icon" id="apple-icon" href="">
<link rel="icon" id="favicon" href="" type="image/png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────────────────── */
:root {
  --rf-yellow:        #FFD60A;
  --rf-yellow-press:  #E6C000;
  --rf-yellow-hover:  #FFE03D;
  --rf-yellow-tint:   #FFF4B0;
  --rf-yellow-50:     #FFFCE5;
  --ink-0:            #000000;
  --ink-1:            #0B0D0E;
  --ink-2:            #1F2426;
  --ink-3:            #4A5258;
  --ink-4:            #8A9197;
  --surface-0:        #FFFFFF;
  --surface-1:        #F4F6F8;
  --surface-2:        #E8ECEF;
  --surface-inverse:  #0B0D0E;
  --border-1:         #E2E6EA;
  --border-2:         #C8CED3;
  --border-strong:    #0B0D0E;
  --accent-blue:      #2563EB;
  --accent-blue-tint: #DCE8FE;
  --success:          #00B87A;
  --success-tint:     #D2F4E4;
  --danger:           #E5484D;
  --danger-tint:      #FCE3E3;
  --warn:             #FF8C00;
  --tag-technik-fg:   var(--accent-blue);
  --tag-technik-bg:   var(--accent-blue-tint);
  --tag-cardio-fg:    var(--ink-1);
  --tag-cardio-bg:    var(--rf-yellow);
  --tag-skills-fg:    #6E2BD9;
  --tag-skills-bg:    #ECE0FF;
  --tag-free-fg:      var(--success);
  --tag-free-bg:      var(--success-tint);
  --tag-rest-fg:      var(--ink-3);
  --tag-rest-bg:      var(--surface-2);
  --font-display: 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif;
  --font-body:    'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --r-0:    0px;
  --r-pill: 9999px;
  --bw-1: 1px; --bw-2: 2px; --bw-3: 3px; --bw-4: 4px;
  --shadow-block:       6px 6px 0 0 var(--ink-1);
  --shadow-block-press: 2px 2px 0 0 var(--ink-1);
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-snap:   cubic-bezier(0.22, 1, 0.36, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 120ms; --dur-base: 180ms; --dur-slow: 320ms;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;
  --sp-6:24px;--sp-7:32px;--sp-8:48px;
}

/* ── RESET ───────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  font:400 15px/1.55 var(--font-body);
  color:var(--ink-1);background:var(--surface-1);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom);
}
button{cursor:pointer;}
svg{display:block;}

/* ── ICON HELPER ─────────────────────────────────────────────────── */
.ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic svg,.ic use{width:100%;height:100%;}
.ic-16{width:16px;height:16px;}
.ic-18{width:18px;height:18px;}
.ic-20{width:20px;height:20px;}
.ic-24{width:24px;height:24px;}

/* ── VIEWS ───────────────────────────────────────────────────────── */
.view{display:none;animation:fadeUp var(--dur-base) var(--ease-snap);}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── NAV ─────────────────────────────────────────────────────────── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--ink-1);color:#fff;
  padding:14px 20px;
  border-bottom:var(--bw-4) solid var(--rf-yellow);
  position:sticky;top:0;z-index:200;
}
.nav-brand{
  font:800 20px/1 var(--font-display);
  letter-spacing:.04em;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:4px;color:#fff;
}
.nav-brand .accent{
  background:var(--rf-yellow);color:var(--ink-1);padding:0 6px;
}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-avatar{
  width:32px;height:32px;
  background:var(--rf-yellow);color:var(--ink-1);
  display:flex;align-items:center;justify-content:center;
  font:700 13px/1 var(--font-body);letter-spacing:.02em;
  border:0;cursor:pointer;flex-shrink:0;transition:background var(--dur-fast);
}
.nav-avatar:hover{background:var(--rf-yellow-hover);}
.sync-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--success);flex-shrink:0;
}
.sync-dot.syncing{background:var(--rf-yellow);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TAB BAR ─────────────────────────────────────────────────────── */
.tabbar{
  position:sticky;bottom:0;
  display:grid;grid-template-columns:repeat(3,1fr);
  background:var(--surface-0);
  border-top:var(--bw-2) solid var(--ink-1);
  z-index:200;
}
.tabbar-btn{
  appearance:none;background:transparent;border:0;
  border-right:var(--bw-1) solid var(--border-1);
  padding:12px 8px 14px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font:600 11px/1.2 var(--font-body);letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-3);transition:color var(--dur-fast),background var(--dur-fast);
  position:relative;
}
.tabbar-btn:last-child{border-right:0;}
.tabbar-btn svg{width:20px;height:20px;stroke-width:2;}
.tabbar-btn:hover{color:var(--ink-1);background:var(--surface-1);}
.tabbar-btn.active{color:var(--ink-1);background:var(--rf-yellow);}
.tabbar-btn.active::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:var(--bw-3);background:var(--ink-1);
}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
.btn{
  appearance:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font:700 15px/1 var(--font-display);letter-spacing:.04em;text-transform:uppercase;
  padding:14px 20px;border:var(--bw-2) solid var(--ink-1);border-radius:var(--r-0);
  transition:transform var(--dur-fast) var(--ease-snap),
             box-shadow var(--dur-fast) var(--ease-snap),
             background var(--dur-fast) var(--ease-snap);
}
.btn svg{width:18px;height:18px;}
.btn-primary{
  background:var(--rf-yellow);color:var(--ink-1);
  box-shadow:var(--shadow-block);
}
.btn-primary:hover{background:var(--rf-yellow-hover);transform:translate(-2px,-2px);box-shadow:8px 8px 0 0 var(--ink-1);}
.btn-primary:active{background:var(--rf-yellow-press);transform:translate(4px,4px);box-shadow:var(--shadow-block-press);}
.btn-primary:disabled{background:var(--surface-2);color:var(--ink-4);border-color:var(--border-2);box-shadow:none;cursor:not-allowed;transform:none;}
.btn-inverse{background:var(--ink-1);color:#fff;}
.btn-inverse:hover{background:var(--ink-2);}
.btn-ghost{background:transparent;color:var(--ink-1);}
.btn-ghost:hover{background:var(--ink-1);color:#fff;}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-block{width:100%;}
.btn-lg{padding:18px 28px;font-size:18px;}
.btn-sm{padding:8px 14px;font-size:12px;}

/* ── CARDS ───────────────────────────────────────────────────────── */
.card{background:var(--surface-0);border:var(--bw-2) solid var(--ink-1);padding:var(--sp-5);}
.card-flat{border-width:var(--bw-1);border-color:var(--border-1);}
.card:hover{box-shadow:4px 4px 0 0 var(--ink-1);}

/* ── TAGS ────────────────────────────────────────────────────────── */
.tag{
  display:inline-flex;align-items:center;
  font:600 11px/1.2 var(--font-body);letter-spacing:.1em;text-transform:uppercase;
  padding:5px 10px;border:0;
}
.tag-technik{color:var(--tag-technik-fg);background:var(--tag-technik-bg);}
.tag-cardio{color:var(--tag-cardio-fg);background:var(--tag-cardio-bg);}
.tag-skills{color:var(--tag-skills-fg);background:var(--tag-skills-bg);}
.tag-free{color:var(--tag-free-fg);background:var(--tag-free-bg);}
.tag-rest{color:var(--tag-rest-fg);background:var(--tag-rest-bg);}

/* ── INPUTS ──────────────────────────────────────────────────────── */
.rf-input{
  width:100%;font:400 15px/1 var(--font-body);
  background:var(--surface-0);color:var(--ink-1);
  padding:14px 16px;
  border:var(--bw-2) solid var(--ink-1);outline:none;
  transition:box-shadow var(--dur-fast);
}
.rf-input:focus{box-shadow:4px 4px 0 0 var(--rf-yellow);}
.rf-input::placeholder{color:var(--ink-4);}

/* ── EYEBROW ─────────────────────────────────────────────────────── */
.eyebrow{
  font:700 11px/1.2 var(--font-body);
  letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);
}

/* ── TODAY VIEW ──────────────────────────────────────────────────── */
.today-hero{padding:var(--sp-5) var(--sp-5) 0;}
.today-greeting-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:12px;margin-bottom:var(--sp-5);
}
.today-greeting{
  font:800 40px/.96 var(--font-display);
  letter-spacing:-.02em;color:var(--ink-1);
}
.today-greeting em{font-style:normal;color:var(--ink-1);}
.streak-chip{
  background:var(--ink-1);color:var(--rf-yellow);
  padding:10px 14px;text-align:center;
  border:var(--bw-2) solid var(--ink-1);
  flex-shrink:0;min-width:72px;
}
.streak-chip__num{font:700 32px/1 var(--font-display);font-variant-numeric:tabular-nums;}
.streak-chip__label{font:600 11px/1 var(--font-body);letter-spacing:.1em;text-transform:uppercase;color:#B8C0C7;margin-top:2px;}

/* Phase band */
.phase-band{
  margin:0 var(--sp-5) var(--sp-4);padding:var(--sp-4);
  background:var(--rf-yellow);border:var(--bw-2) solid var(--ink-1);
}
.phase-band-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.phase-band-name{font:700 13px/1 var(--font-body);letter-spacing:0;}
.phase-band-pct{font:800 28px/.92 var(--font-display);letter-spacing:-.02em;}
.progress-track{height:6px;background:rgba(0,0,0,.15);}
.progress-fill{height:6px;background:var(--ink-1);transition:width .6s var(--ease-out);}

/* Workout card */
.workout-card{background:var(--surface-0);border:var(--bw-2) solid var(--ink-1);margin:0 var(--sp-5) var(--sp-4);}
.workout-header{
  padding:18px 20px;background:var(--ink-1);color:#fff;
  display:flex;justify-content:space-between;align-items:flex-end;gap:12px;
}
.workout-header .eyebrow{color:var(--rf-yellow);}
.workout-name{font:700 28px/1.05 var(--font-display);color:#fff;margin-top:4px;}
.workout-meta{font:500 13px/1.45 var(--font-body);color:#B8C0C7;text-align:right;}
.ex-list{}
.ex-row{
  display:grid;grid-template-columns:36px 1fr auto 28px;
  gap:12px;align-items:center;
  padding:14px 16px;
  border-bottom:var(--bw-1) solid var(--border-1);
  background:var(--surface-0);transition:background var(--dur-fast);
}
.ex-row:last-child{border-bottom:none;}
.ex-row:hover{background:var(--surface-1);}
.ex-row.done{opacity:.5;}
.ex-row.done .ex-name{text-decoration:line-through;}
.ex-num{font:700 20px/1.2 var(--font-display);color:var(--ink-4);font-variant-numeric:tabular-nums;}
.ex-name{font:600 15px/1.55 var(--font-body);margin-bottom:2px;}
.ex-detail{font:500 13px/1.45 var(--font-body);color:var(--ink-3);}
.ex-dur{font:700 13px/1 var(--font-body);color:var(--ink-1);white-space:nowrap;text-align:right;}
.ex-check{
  width:24px;height:24px;
  border:var(--bw-2) solid var(--border-2);
  display:flex;align-items:center;justify-content:center;
  background:var(--surface-0);
}
.ex-check svg{width:12px;height:12px;}
.ex-row.done .ex-check{background:var(--ink-1);color:var(--rf-yellow);border-color:var(--ink-1);}

/* Week strip */
.week-strip{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;padding:0 var(--sp-5) var(--sp-4);
}
.week-day{
  background:var(--surface-0);border:var(--bw-1) solid var(--border-1);
  padding:8px 4px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.week-day.today{background:var(--ink-1);color:#fff;border-color:var(--ink-1);}
.week-day.today .wd-num{color:var(--rf-yellow);}
.week-day.done{background:var(--rf-yellow-tint);}
.wd-label{font:600 11px/1.2 var(--font-body);letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);}
.week-day.today .wd-label{color:#B8C0C7;}
.wd-num{font:800 20px/1.2 var(--font-display);}
.wd-check{width:14px;height:14px;color:var(--ink-1);}
.wd-check svg{width:100%;height:100%;}

/* Rest day */
.rest-card{
  margin:0 var(--sp-5) var(--sp-4);
  background:var(--surface-0);border:var(--bw-2) solid var(--ink-1);
  padding:48px 24px;text-align:center;
}
.rest-icon{width:48px;height:48px;margin:0 auto 16px;color:var(--success);}
.rest-icon svg{width:100%;height:100%;}
.rest-title{font:800 32px/.92 var(--font-display);letter-spacing:-.02em;margin-bottom:8px;color:var(--success);}
.rest-text{font:400 15px/1.55 var(--font-body);color:var(--ink-3);max-width:280px;margin:0 auto;}

/* ── PLAN VIEW ───────────────────────────────────────────────────── */
.plan-section{padding:var(--sp-5) var(--sp-5) 0;}
.section-header{
  font:700 11px/1.2 var(--font-body);letter-spacing:.16em;text-transform:uppercase;color:var(--ink-1);
  border-bottom:var(--bw-2) solid var(--ink-1);padding-bottom:8px;margin-bottom:14px;
}
.plan-cards{display:flex;flex-direction:column;gap:0;padding-bottom:100px;}
.plan-card{
  background:var(--surface-0);border:var(--bw-2) solid var(--ink-1);
  margin-bottom:-2px;overflow:hidden;
  transition:transform var(--dur-fast) var(--ease-snap);
}
.plan-card:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 0 var(--ink-1);z-index:1;position:relative;}
.plan-card.plan-today{background:var(--rf-yellow);}
.plan-card-header{
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
  padding:16px 18px;cursor:pointer;
}
.plan-day-label{font:600 11px/1 var(--font-body);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px;}
.plan-day-title{font:700 15px/1.2 var(--font-body);margin-bottom:3px;}
.plan-day-exs{font:500 13px/1.45 var(--font-body);color:var(--ink-3);}
.plan-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.plan-chevron{width:18px;height:18px;color:var(--ink-3);transition:transform var(--dur-base);}
.plan-chevron.open{transform:rotate(180deg);}
.plan-chevron svg{width:100%;height:100%;}
.plan-ex-list{border-top:var(--bw-1) solid var(--border-1);padding:4px 0 8px;}
.plan-ex-row{display:flex;flex-direction:column;padding:14px 18px;border-bottom:var(--bw-1) solid var(--border-1);}
.plan-ex-row:last-child{border-bottom:none;}
.plan-ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;}
.plan-ex-name{font:600 15px/1.55 var(--font-body);margin-bottom:2px;}
.plan-ex-detail{font:500 13px/1.45 var(--font-body);color:var(--ink-3);}
.plan-ex-meta{font:700 13px/1 var(--font-body);color:var(--ink-1);text-align:right;white-space:nowrap;flex-shrink:0;}
.plan-ex-tips{list-style:none;border-top:var(--bw-1) solid var(--border-1);padding-top:10px;display:flex;flex-direction:column;gap:5px;}
.plan-ex-tips li{font:400 13px/1.45 var(--font-body);color:var(--ink-2);padding-left:14px;position:relative;}
.plan-ex-tips li::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--rf-yellow);border:1px solid var(--ink-1);}

/* ── PROFILE VIEW ────────────────────────────────────────────────── */
.profile-hero{
  display:flex;gap:16px;align-items:flex-start;
  padding:var(--sp-5) var(--sp-5) 0;
}
.profile-avatar{
  width:72px;height:72px;
  background:var(--ink-1);color:var(--rf-yellow);
  display:flex;align-items:center;justify-content:center;
  font:900 40px/.96 var(--font-display);
  border:var(--bw-2) solid var(--ink-1);flex-shrink:0;
}
.profile-name{font:800 28px/1.05 var(--font-display);letter-spacing:-.01em;margin-bottom:2px;}
.profile-level{font:700 11px/1.2 var(--font-body);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px;}
.profile-since{font:400 13px/1.45 var(--font-body);color:var(--ink-3);}
.profile-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  margin:var(--sp-5) var(--sp-5) 0;
  border:var(--bw-2) solid var(--ink-1);
}
@media(max-width:400px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-box{
  padding:14px 12px;
  border-right:var(--bw-1) solid var(--border-1);
  background:var(--surface-0);
}
.stat-box:last-child{border-right:none;}
.stat-num{font:700 32px/1 var(--font-display);letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
.stat-num.yellow{color:var(--rf-yellow);}
.stat-label{font:600 9px/1.3 var(--font-body);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.profile-section{margin:var(--sp-5) var(--sp-5) 0;}
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.badge-tile{
  background:var(--surface-0);border:var(--bw-2) solid var(--border-1);
  padding:var(--sp-4) var(--sp-3);text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:transform var(--dur-base) var(--ease-bounce);
}
.badge-tile.earned{border-color:var(--ink-1);background:var(--rf-yellow-tint);}
.badge-tile.earned:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 0 var(--ink-1);}
.badge-tile.locked{opacity:.35;}
.badge-icon{width:36px;height:36px;}
.badge-icon svg{width:100%;height:100%;}
.badge-name{font:600 11px/1.3 var(--font-body);letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);}
.badge-desc{font-size:10px;color:var(--ink-3);line-height:1.3;}

.history-list{display:flex;flex-direction:column;gap:4px;padding-bottom:100px;}
.history-row{
  background:var(--surface-0);border:var(--bw-1) solid var(--border-1);
  padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
}
.history-date{font:400 13px/1.45 var(--font-body);color:var(--ink-3);}
.history-name{font:600 15px/1.55 var(--font-body);}
.history-dur{font:700 13px/1 var(--font-mono);color:var(--ink-1);font-variant-numeric:tabular-nums;}

/* nickname */
.nickname-wrap{display:flex;gap:8px;margin-top:12px;}
.nickname-input{
  flex:1;padding:8px 12px;
  border:var(--bw-2) solid var(--ink-1);background:var(--surface-0);
  font:400 15px/1 var(--font-body);color:var(--ink-1);outline:none;
}
.nickname-input:focus{box-shadow:4px 4px 0 0 var(--rf-yellow);}
.nickname-save-btn{
  background:var(--rf-yellow);border:var(--bw-2) solid var(--ink-1);color:var(--ink-1);
  font:700 11px/1 var(--font-body);letter-spacing:.08em;text-transform:uppercase;
  padding:8px 14px;white-space:nowrap;
  transition:background var(--dur-fast);
}
.nickname-save-btn:hover{background:var(--rf-yellow-hover);}

/* ── TIMER OVERLAY ───────────────────────────────────────────────── */
.timer-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:var(--surface-inverse);
  flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;
}
.timer-overlay.open{display:flex;animation:fadeUp var(--dur-base) var(--ease-snap);}
.timer-close-btn{
  position:absolute;top:18px;right:18px;
  width:40px;height:40px;background:var(--surface-0);
  border:var(--bw-2) solid var(--surface-0);
  display:flex;align-items:center;justify-content:center;
}
.timer-close-btn svg{width:20px;height:20px;}
.timer-close-btn:hover{background:var(--rf-yellow);border-color:var(--rf-yellow);}
.timer-round{font:600 11px/1.2 var(--font-body);letter-spacing:.16em;text-transform:uppercase;color:#B8C0C7;margin-bottom:8px;text-align:center;}
.timer-ex-label{font:600 11px/1.2 var(--font-body);letter-spacing:.14em;text-transform:uppercase;color:#B8C0C7;margin-bottom:6px;text-align:center;}
.timer-ex-name{font:600 15px/1.55 var(--font-body);color:#fff;margin-bottom:28px;text-align:center;max-width:300px;}
.timer-pill{
  font:600 11px/1.2 var(--font-body);letter-spacing:.16em;text-transform:uppercase;
  padding:8px 18px;margin-bottom:20px;
}
.timer-pill.prep{background:var(--accent-blue-tint);color:var(--accent-blue);}
.timer-pill.work{background:var(--rf-yellow);color:var(--ink-1);}
.timer-pill.rest{background:var(--success-tint);color:var(--success);}
.timer-digits{
  font:700 clamp(80px,22vw,160px)/.95 var(--font-display);
  letter-spacing:-.04em;font-variant-numeric:tabular-nums;
  color:#fff;margin-bottom:28px;
}
.timer-digits.work{color:var(--rf-yellow);}
.timer-digits.rest{color:var(--success);}
.timer-digits.prep{color:var(--accent-blue);}
.timer-progress-wrap{width:100%;max-width:340px;margin-bottom:8px;}
.timer-progress-track{height:6px;background:rgba(255,255,255,.1);}
.timer-progress-fill{height:6px;background:var(--rf-yellow);transition:width .4s linear;}
.timer-rounds-label{font:500 13px/1.45 var(--font-body);color:#B8C0C7;text-align:center;margin-bottom:32px;margin-top:8px;}
.timer-btns{display:flex;gap:12px;margin-bottom:20px;}
.t-btn-main{
  background:var(--rf-yellow);border:var(--bw-2) solid var(--rf-yellow);color:var(--ink-1);
  font:700 16px/1 var(--font-display);letter-spacing:.08em;text-transform:uppercase;
  padding:16px 44px;
  transition:background var(--dur-fast);
}
.t-btn-main:hover{background:var(--rf-yellow-hover);}
.t-btn-sec{
  background:transparent;border:var(--bw-2) solid rgba(255,255,255,.3);color:#fff;
  font:600 13px/1 var(--font-body);letter-spacing:.08em;text-transform:uppercase;
  padding:16px 20px;
  transition:border-color var(--dur-fast);
}
.t-btn-sec:hover{border-color:#fff;}
.timer-skip{
  font:600 11px/1.2 var(--font-body);letter-spacing:.1em;text-transform:uppercase;
  color:#B8C0C7;background:none;border:none;
  display:flex;align-items:center;gap:6px;padding:12px;
}
.timer-skip:hover{color:#fff;}
.timer-skip svg{width:16px;height:16px;}

/* ── COMPLETE OVERLAY ────────────────────────────────────────────── */
.complete-overlay{
  display:none;position:fixed;inset:0;z-index:400;
  background:var(--surface-0);
  flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;text-align:center;
}
.complete-overlay.open{display:flex;animation:fadeUp var(--dur-base) var(--ease-snap);}
.complete-burst{
  width:120px;height:120px;
  background:var(--rf-yellow);border:var(--bw-4) solid var(--ink-1);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:var(--sp-6);
  animation:rfPop var(--dur-slow) var(--ease-bounce);
}
.complete-burst svg{width:56px;height:56px;}
@keyframes rfPop{0%{transform:scale(.7)}80%{transform:scale(1.05)}100%{transform:scale(1)}}
.complete-title{font:900 64px/.92 var(--font-display);letter-spacing:-.02em;margin-bottom:8px;}
.complete-title span{color:var(--success);}
.complete-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  width:100%;max-width:320px;margin:24px auto;
}
.complete-stat{background:var(--surface-0);border:var(--bw-2) solid var(--ink-1);padding:16px 14px;}
.complete-stat-num{font:700 32px/1 var(--font-display);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.complete-stat-label{font:600 9px/1.3 var(--font-body);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-top:4px;}
.new-badge-wrap{
  width:100%;max-width:320px;
  background:var(--rf-yellow-tint);border:var(--bw-2) solid var(--ink-1);
  padding:16px;margin-bottom:16px;
}
.new-badge-label{font:700 11px/1.2 var(--font-body);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-1);margin-bottom:10px;}
.new-badge-item{
  font:600 13px/1 var(--font-body);
  background:var(--surface-0);border:var(--bw-1) solid var(--ink-1);
  padding:6px 14px;display:inline-flex;align-items:center;gap:6px;margin:3px;
}
.new-badge-item svg{width:14px;height:14px;}

/* ── AUTH SCREEN ─────────────────────────────────────────────────── */
.auth-screen{
  display:none;position:fixed;inset:0;z-index:500;
  background:var(--surface-0);
  flex-direction:column;
  min-height:100vh;
}
.auth-screen.active{display:flex;}
.auth-top{
  background:var(--rf-yellow);
  padding:64px 24px 48px;
  border-bottom:var(--bw-4) solid var(--ink-1);
}
.auth-brand{
  font:800 32px/1 var(--font-display);
  letter-spacing:.04em;text-transform:uppercase;
  color:var(--ink-1);margin-bottom:10px;
}
.auth-brand .accent{background:var(--ink-1);color:var(--rf-yellow);padding:0 8px;}
.auth-tagline{font:700 11px/1.2 var(--font-body);letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);}
.auth-form-wrap{padding:32px 24px;display:flex;flex-direction:column;gap:12px;flex:1;}
.auth-tabs{
  display:grid;grid-template-columns:1fr 1fr;
  border:var(--bw-2) solid var(--ink-1);margin-bottom:8px;
}
.auth-tab{
  background:var(--surface-0);border:0;
  border-right:var(--bw-2) solid var(--ink-1);
  padding:14px;font:600 15px/1.55 var(--font-body);
  transition:background var(--dur-fast),color var(--dur-fast);
}
.auth-tab:last-child{border-right:0;}
.auth-tab.active{background:var(--ink-1);color:var(--rf-yellow);}
.pw-wrap{position:relative;}
.pw-input{padding-right:44px;}
.pw-toggle{
  position:absolute;right:0;top:0;bottom:0;width:44px;
  background:none;border:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-4);
}
.pw-toggle:hover{color:var(--ink-1);}
.pw-toggle svg{width:18px;height:18px;}
.auth-msg{font:500 13px/1.45 var(--font-body);text-align:center;min-height:20px;}
.auth-msg.error{color:var(--danger);}
.auth-msg.success{color:var(--success);}
.auth-version{text-align:center;font:600 11px/1.2 var(--font-body);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-4);margin-top:auto;padding-bottom:24px;}

/* ── BOTTOM PAD ──────────────────────────────────────────────────── */
.bottom-pad{height:20px;}
</style>

function defaultState(){
  return {startDate:new Date().toISOString().slice(0,10),currentPhase:0,totalSessions:0,
    totalMinutes:0,streak:0,maxStreak:0,earnedBadges:[],history:[],completedDays:{},
    perfectWeeks:0,freestyleSessions:0,repeatSessions:0,nickname:''};

function loadState(){ return defaultState(); }

function saveState(){
  // Local cache
  try{ localStorage.setItem('rope_v3', JSON.stringify(STATE)); }catch(e){}
  // Debounced cloud save
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){ syncToCloud(); }, 1500);
}

async function syncToCloud(){
  if(!currentUser) return;
  setSyncDot('syncing');
  try{
    var check = await supa.from('Profiles').select('id').eq('user_id', currentUser.id).single();
    var res;
    if(check.data){
      res = await supa.from('Profiles').update({
        data: STATE,
        updated_at: new Date().toISOString()
      }).eq('user_id', currentUser.id);
    } else {
      res = await supa.from('Profiles').insert({
        user_id: currentUser.id,
        data: STATE,
        updated_at: new Date().toISOString()
      });
    }
    if(!res.error) setSyncDot('ok');
    else{ console.error('Sync error:', res.error); setSyncDot(''); }
  }catch(e){ console.error('Sync exception:', e); setSyncDot(''); }
}

async function loadFromCloud(){
  if(!currentUser){ STATE = defaultState(); return; }
  // Timeout after 5s — always proceed even if cloud fails
  var cloudDone = false;
  var timeoutPromise = new Promise(function(resolve){
    setTimeout(function(){ 
      if(!cloudDone) { STATE = defaultState(); }
      resolve(); 
    }, 5000);
  });
  var fetchPromise = (async function(){
    try{
      var res = await supa.from('Profiles').select('data').eq('user_id', currentUser.id).single();
      cloudDone = true;
      if(res.data && res.data.data){
        STATE = res.data.data;
        try{ localStorage.setItem('rope_v3', JSON.stringify(STATE)); }catch(e){}
      } else {
        STATE = defaultState();
      }
    }catch(e){
      cloudDone = true;
      try{
        var r = localStorage.getItem('rope_v3');
        STATE = r ? JSON.parse(r) : defaultState();
      }catch(e2){ STATE = defaultState(); }
    }
  })();
  await Promise.race([fetchPromise, timeoutPromise]);
}

function setSyncDot(state){
  var dot = document.getElementById('sync-dot');
  if(!dot) return;
  if(state==='syncing'){ dot.className='sync-dot syncing'; dot.title='Speichert...'; }
  else if(state==='ok'){ dot.className='sync-dot'; dot.title='Gespeichert'; }
  else { dot.style.display='none'; }
}

async function authSubmit(){
  var email = document.getElementById('auth-email').value.trim();
  var password = document.getElementById('auth-password').value;
  var msg = document.getElementById('auth-msg');
  var btn = document.getElementById('auth-submit-btn');
  if(!email || !password){ msg.textContent='Bitte E-Mail und Passwort eingeben.'; msg.className='auth-msg error'; return; }
  btn.disabled = true;
  btn.textContent = '...';
  msg.textContent = '';

  try{
    var res;
    if(authMode === 'login'){
      res = await supa.auth.signInWithPassword({ email: email, password: password });
    } else {
      res = await supa.auth.signUp({ email: email, password: password });
    }
    if(res.error){
      msg.textContent = res.error.message;
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = authMode === 'login' ? 'ANMELDEN' : 'REGISTRIEREN';
    } else if(authMode === 'register' && !res.data.session){
      msg.textContent = 'Konto erstellt! Bitte jetzt anmelden.';
      msg.className = 'auth-msg success';
      btn.disabled = false;
      btn.textContent = 'REGISTRIEREN';
      setTimeout(function(){
        switchAuthTab('login', document.querySelector('.auth-tab'));
      }, 1500);
    } else if(res.data && res.data.session){
      // Login success — manually proceed instead of waiting for onAuthStateChange
      msg.textContent = 'Anmeldung erfolgreich...';
      msg.className = 'auth-msg success';
      currentUser = res.data.session.user;
      var nu = document.getElementById('nav-user-email');
      if(nu) nu.textContent = currentUser.email;
      await loadFromCloud();
      hideAuthScreen();
      advancePlan();
      renderToday();
    }
  }catch(e){
    msg.textContent = 'Verbindungsfehler: ' + e.message;
    msg.className = 'auth-msg error';
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'ANMELDEN' : 'REGISTRIEREN';
  }
}

function showAuthScreen(){
  document.getElementById('auth-screen').classList.add('active');
}

function hideAuthScreen(){
  document.getElementById('auth-screen').classList.remove('active');
}

async function repeatWorkout(){
  // Start workout again even if already done today — without marking as new session
  var wk = getTodayWorkout();
  var exercises = getExercises(wk.template.name);
  T = {exercises:exercises, exIdx:0, round:1, seconds:3, total:3,
    phase:'prep', running:true, interval:null, startTime:Date.now(), done:0, isRepeat:true};
  document.getElementById('timer-overlay').classList.add('open');
  updateTimerUI();
  T.interval = setInterval(tick, 1000);
  document.getElementById('t-main-btn').textContent = 'PAUSE';
}

async function signOut(){
  await supa.auth.signOut();
  currentUser = null;
  STATE = defaultState();
  showAuthScreen();
}

async function resetProgress(){
  if(!confirm('Wirklich alle Fortschritte löschen und neu starten?')) return;
  STATE = defaultState();
  try{ localStorage.removeItem('rope_v3'); }catch(e){}
  if(currentUser){
    await supa.from('Profiles').update({
      data: STATE,
      updated_at: new Date().toISOString()
    }).eq('user_id', currentUser.id);
  }
  renderProfile();
  renderToday();
  showView('today', document.querySelector('.nav-tab'));
}

function getDisplayName(email){
  if(!email) return '';
  // Take part before @ and capitalize first letter
  var name = email.split('@')[0];
  return name.charAt(0).toUpperCase() + name.slice(1);
}
let STATE=loadState();

function todayStr(){return new Date().toISOString().slice(0,10);}
function getStreak(){
  let s=0,d=new Date();
  for(let i=0;i<365;i++){
    const ds=d.toISOString().slice(0,10);
    if(STATE.completedDays[ds]){s++;d.setDate(d.getDate()-1);}
    else if(i===0)d.setDate(d.getDate()-1);
    else break;
  }
  return s;
}
function getTodayWorkout(){
  // Anchor plan slot 0 to the weekday we started on, so labels always match real calendar days
  const startWd=new Date(STATE.startDate).getDay();
  const todayWd=new Date().getDay();
  const planDay=((todayWd-startWd)+7)%7;
  return{planDay,template:WEEKLY_TEMPLATE[planDay]};
}
function getCurrentPhase(){return PHASES[Math.min(STATE.currentPhase,2)];}
function getExercises(name){const p=getCurrentPhase();return p.exercises[name]||p.exercises['Freestyle'];}
function checkBadges(){
  const nb=[];STATE.streak=getStreak();STATE.maxStreak=Math.max(STATE.maxStreak,STATE.streak);
  ALL_BADGES.forEach(b=>{if(!STATE.earnedBadges.includes(b.id)&&b.cond(STATE)){STATE.earnedBadges.push(b.id);nb.push(b);}});
  return nb;
}
function advancePlan(){
  const dw=Math.floor((new Date()-new Date(STATE.startDate))/(7*86400000));
  const t=dw>=10?2:dw>=4?1:0;
  if(t>STATE.currentPhase){STATE.currentPhase=t;saveState();}
}

function renderToday(){
  advancePlan();
  var now = new Date();
  document.getElementById('today-date-label').textContent = DAYS_FULL[now.getDay()] + ', ' + now.toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'});
  var wk = getTodayWorkout();
  var template = wk.template;
  var h = now.getHours();
  var nick = (STATE.nickname||'').trim();
  var greetings = {
    morning: nick ? 'GUTEN<br>MORGEN<br><em>'+nick.toUpperCase()+'</em>' : 'GUTEN<br><em>MORGEN</em>',
    day:     nick ? 'LOS<br>GEHT\'S<br><em>'+nick.toUpperCase()+'</em>' : 'LOS<br><em>GEHT\'S</em>',
    evening: nick ? 'ABEND-<br>WORKOUT<br><em>'+nick.toUpperCase()+'</em>' : 'ABEND-<br><em>WORKOUT</em>'
  };
  document.getElementById('today-greeting').innerHTML = h < 12 ? greetings.morning : h < 18 ? greetings.day : greetings.evening;
  var streak = getStreak(); STATE.streak = streak;
  document.getElementById('streak-num').textContent = streak;

  var phase = getCurrentPhase();
  var diffD = Math.floor((new Date() - new Date(STATE.startDate)) / 86400000);
  var ps = STATE.currentPhase === 0 ? 0 : STATE.currentPhase === 1 ? 28 : 70;
  var pct = Math.min(100, Math.round(((diffD - ps) / (phase.weeks * 7)) * 100));
  document.getElementById('phase-tag').textContent = phase.tag;
  document.getElementById('phase-name').textContent = phase.name;
  document.getElementById('phase-progress-label').textContent = 'Fortschritt ' + pct + '%';
  document.getElementById('phase-bar-fill').style.width = pct + '%';

  var done = !!STATE.completedDays[todayStr()];
  var box = document.getElementById('today-content');

  if (template.tag === 'Rest') {
    box.innerHTML = '<div class="rest-card"><div class="rest-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 12c2-4 4-4 6 0s4 4 6 0 4-4 6 0"/></svg></div><div class="rest-title">RUHETAG</div><div class="rest-text">Heute ist Erholung angesagt. Leichtes Dehnen oder spazieren gehen.</div></div>';
    return;
  }

  var exercises = getExercises(template.name);
  var mins = Math.round(exercises.reduce(function(a,e){ return a + (e.work + e.rest) * e.rounds; }, 0) / 60);

  var exHTML = '';
  for (var i = 0; i < exercises.length; i++) {
    var e = exercises[i];
    exHTML += '<div class="exercise-item' + (done ? ' done' : '') + '" id="ex-item-' + i + '">'
      + '<div class="ex-num">' + String(i+1).padStart(2,'0') + '</div>'
      + '<div class="ex-body"><div class="ex-name">' + e.name + '</div><div class="ex-detail">' + e.detail + '</div></div>'
      + '<div class="ex-dur">' + e.rounds + '\u00d7 ' + e.work + 's</div>'
      + '<div class="ex-check">' + (done ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="4 12 9 17 20 7"/></svg>' : '') + '</div>'
      + '</div>';
  }

  var btnIcon = done ? ICONS.check : ICONS.play;
  var btnLabel = done ? 'Heute erledigt' : 'WORKOUT STARTEN';
  var btnClass = 'start-workout-btn' + (done ? ' completed' : '');
  var btnDisabled = done ? 'disabled' : '';
  var repeatBtn = done ? '<button class="btn btn-ghost btn-block" style="margin:0 20px 16px;width:calc(100% - 40px);" onclick="repeatWorkout()">Wiederholen</button>' : '';

  box.innerHTML = '<div class="workout-card">'
    + '<div class="workout-card-header">'
    + '<div><div class="workout-day-label">' + template.tag + ' \u2014 ' + phase.tag + '</div>'
    + '<div class="workout-name">' + template.name + '</div></div>'
    + '<div class="workout-meta">~' + mins + ' Min \u00b7 ' + exercises.length + ' \u00dcbungen</div>'
    + '</div>'
    + '<div class="exercise-list">' + exHTML + '</div>'
    + '</div>'
    + '<button class="btn btn-primary btn-block btn-lg" style="margin:4px 20px 8px;width:calc(100% - 40px);" onclick="startWorkout()" ' + btnDisabled + '>'
    + btnLabel
    + '</button>'
    + (repeatBtn || '');
}

// TIMER
let T={exercises:[],exIdx:0,round:1,seconds:3,total:3,phase:'prep',running:false,interval:null,startTime:null,done:0};

function startWorkout(){
  const{template}=getTodayWorkout();
  T={exercises:getExercises(template.name),exIdx:0,round:1,seconds:3,total:3,phase:'prep',running:true,interval:null,startTime:Date.now(),done:0};
  document.getElementById('timer-overlay').classList.add('open');
  updateTimerUI();
  T.interval=setInterval(tick,1000);
  document.getElementById('t-main-btn').textContent='PAUSE';
}

function tick(){T.seconds--;if(T.seconds<=0)advance();updateTimerUI();}

function advance(){
  const ex=T.exercises[T.exIdx];
  if(T.phase==='prep'){T.phase='work';T.seconds=ex.work;T.total=ex.work;}
  else if(T.phase==='work'){
    if(T.round<ex.rounds){T.phase='rest';T.seconds=ex.rest;T.total=ex.rest;}
    else{T.done++;markExDone(T.exIdx);T.exIdx++;if(T.exIdx>=T.exercises.length){timerDone();return;}T.round=1;T.phase='prep';T.seconds=3;T.total=3;}
  }
  else{T.round++;T.phase='work';T.seconds=T.exercises[T.exIdx].work;T.total=T.exercises[T.exIdx].work;}
}

function updateTimerUI(){
  const ex=T.exercises[T.exIdx];if(!ex)return;
  const m=String(Math.floor(T.seconds/60)).padStart(2,'0'),s=String(T.seconds%60).padStart(2,'0');
  const d=document.getElementById('timer-digits');
  d.textContent=T.phase==='prep'?String(T.seconds).padStart(2,'0'):`${m}:${s}`;
  d.className='timer-big '+T.phase;
  const pill=document.getElementById('timer-pill');
  pill.className='timer-pill '+T.phase;
  pill.textContent={prep:'Bereit',work:'Springen',rest:'Pause'}[T.phase];
  document.getElementById('t-ex-name').textContent=ex.name+' — '+ex.detail;
  document.getElementById('t-progress').style.width=(((T.total-T.seconds)/T.total)*100)+'%';
  document.getElementById('t-rounds').textContent=`Übung ${T.exIdx+1}/${T.exercises.length}`+(T.phase!=='prep'?` · Runde ${T.round}/${ex.rounds}`:'');
}

function markExDone(i){const el=document.getElementById('ex-item-'+i);if(el){el.classList.add('done');el.querySelector('.ex-check').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="4 12 9 17 20 7"/></svg>';}}
function timerToggle(){
  if(T.running){clearInterval(T.interval);T.running=false;document.getElementById('t-main-btn').textContent='WEITER';var pp=document.getElementById('timer-pill'); if(pp)pp.textContent='Pausiert';}
  else{T.running=true;T.interval=setInterval(tick,1000);document.getElementById('t-main-btn').textContent='PAUSE';}
}function timerReset(){clearInterval(T.interval);T.phase='prep';T.seconds=3;T.total=3;T.exIdx=0;T.round=1;T.running=true;updateTimerUI();T.interval=setInterval(tick,1000);document.getElementById('t-main-btn').textContent='PAUSE';}
function timerNextExercise(){T.done++;markExDone(T.exIdx);T.exIdx++;if(T.exIdx>=T.exercises.length){timerDone();return;}T.round=1;T.phase='prep';T.seconds=3;T.total=3;updateTimerUI();}
function closeTimer(){clearInterval(T.interval);T.running=false;document.getElementById('timer-overlay').classList.remove('open');}

function timerDone(){
  clearInterval(T.interval);T.running=false;
  document.getElementById('timer-overlay').classList.remove('open');
  const mins=Math.max(1,Math.round((Date.now()-T.startTime)/60000));
  const{template}=getTodayWorkout();
  STATE.completedDays[todayStr()]=true;STATE.totalSessions++;STATE.totalMinutes+=mins;
  if(template.name==='Freestyle')STATE.freestyleSessions++;
  const ws=new Date();ws.setDate(ws.getDate()-ws.getDay()+1);
  let wc=0;for(let i=0;i<5;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);if(STATE.completedDays[d.toISOString().slice(0,10)])wc++;}
  if(wc>=5)STATE.perfectWeeks++;
  const nb=checkBadges();
  STATE.history.unshift({date:todayStr(),name:template.name,minutes:mins});
  if(STATE.history.length>20)STATE.history=STATE.history.slice(0,20);
  saveState();
  document.getElementById('complete-stats').innerHTML=`
    <div class="complete-stat"><div class="complete-stat-num">${mins}</div><div class="complete-stat-label">Minuten</div></div>
    <div class="complete-stat"><div class="complete-stat-num">${T.done}</div><div class="complete-stat-label">Übungen</div></div>
    <div class="complete-stat"><div class="complete-stat-num">${STATE.streak}</div><div class="complete-stat-label">Streak</div></div>
    <div class="complete-stat"><div class="complete-stat-num">${STATE.totalSessions}</div><div class="complete-stat-label">Total</div></div>`;
  if(nb.length){document.getElementById('new-badge-wrap').style.display='block';document.getElementById('new-badge-items').innerHTML=nb.map(function(b){return '<span class="new-badge-item">'+b.name+'</span>';}).join('');}
  else document.getElementById('new-badge-wrap').style.display='none';
  document.getElementById('complete-overlay').classList.add('open');
}
function closeComplete(){document.getElementById('complete-overlay').classList.remove('open');renderToday();}

function renderPlan(){
  const today=new Date(),strip=document.getElementById('week-strip');
  strip.innerHTML='';
  // Show Mon–Sun of current calendar week
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(today.getDate()-today.getDay()+1+i);
    const ds=d.toISOString().slice(0,10),isT=ds===todayStr(),isDone=!!STATE.completedDays[ds];
    const doneIcon=isDone?`<span class="wd-done">${ICONS.check}</span>`:'';
    strip.innerHTML+=`<div class="week-day${isT?' today':''}${isDone?' done':''}">${DAYS_DE[(d.getDay()+7)%7]}<span class="wd-num">${d.getDate()}</span>${doneIcon}</div>`;
  }
  // Plan cards: slot 0 = start weekday, label each slot with its real weekday name
  const phase=getCurrentPhase();
  const startWd=new Date(STATE.startDate).getDay(); // 0=Sun
  document.getElementById('plan-cards').innerHTML=WEEKLY_TEMPLATE.map((t,slot)=>{
    const wd=(startWd+slot)%7;
    const dayLabel=DAYS_FULL[wd];
    const ex=phase.exercises[t.name]||[];
    const m=ex.length?Math.round(ex.reduce((a,e)=>a+(e.work+e.rest)*e.rounds,0)/60):0;
    const todaySlot=((new Date().getDay()-startWd)+7)%7;
    const isToday=slot===todaySlot;
    var exRows = '';
    for (var ei = 0; ei < ex.length; ei++) {
      var e = ex[ei];
      var tipsHtml = '';
      if (e.tips && e.tips.length) {
        tipsHtml = '<ul class="plan-ex-tips">';
        for (var ti = 0; ti < e.tips.length; ti++) tipsHtml += '<li>' + e.tips[ti] + '</li>';
        tipsHtml += '</ul>';
      }
      exRows += '<div class="plan-ex-row">'
        + '<div class="plan-ex-top">'
        + '<div class="plan-ex-body">'
        + '<div class="plan-ex-name">' + e.name + '</div>'
        + '<div class="plan-ex-detail">' + e.detail + '</div>'
        + '</div>'
        + '<div class="plan-ex-meta">' + e.rounds + '× ' + e.work + 's<br><span style="color:var(--muted);font-size:.68rem">' + e.rest + 's Pause</span></div>'
        + '</div>'
        + tipsHtml
        + '</div>';
    }
    var restRow = '<div class="plan-ex-row"><div class="plan-ex-top"><div class="plan-ex-body"><div class="plan-ex-name">Aktive Erholung</div><div class="plan-ex-detail">Dehnen, Mobilität, Spazieren</div></div></div><ul class="plan-ex-tips"><li>Kein Seil heute — Körper regeneriert sich</li><li>10–15 Min leichtes Dehnen reicht</li><li>Spazieren gehen zählt als aktive Erholung</li></ul></div>';
    var cardClass = 'plan-day-card' + (isToday ? ' plan-today' : '');
    var exSummary = ex.length ? ex.length + ' Übungen · ~' + m + ' Min' : t.desc;
    var chevronSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
    return '<div class="' + cardClass + '" id="pcard-' + slot + '">'
      + '<div class="plan-day-header" onclick="togglePlanCard(' + slot + ')">'
      + '<div class="plan-day-left">'
      + '<div class="plan-day-label">' + dayLabel + '</div>'
      + '<div class="plan-day-title">' + t.name + '</div>'
      + '<div class="plan-day-exs">' + exSummary + '</div>'
      + '</div>'
      + '<div class="plan-day-right">'
      + '<div class="plan-day-tag ' + t.tagClass + '">' + t.tag + '</div>'
      + '<div class="plan-chevron" id="chevron-' + slot + '">' + chevronSVG + '</div>'
      + '</div>'
      + '</div>'
      + '<div class="plan-ex-list" id="plist-' + slot + '" style="display:none">'
      + (ex.length ? exRows : restRow)
      + '</div>'
      + '</div>';
  }).join('');
}

function renderProfile(){
  const streak=getStreak();STATE.streak=streak;
  const levels=['Blutiger Anfänger','Einsteiger','Schüler','Fortgeschrittener','Könner','Experte'];
  document.getElementById('profile-level-text').textContent=levels[Math.min(Math.floor(STATE.totalSessions/8),5)];
  var pal=document.getElementById('profile-avatar-letter'); if(pal&&currentUser)pal.textContent=currentUser.email.charAt(0).toUpperCase();
  var pnd=document.getElementById('profile-name-display'); if(pnd)pnd.textContent=STATE.nickname||getDisplayName(currentUser?currentUser.email:'');
  document.getElementById('profile-since').textContent='Dabei seit '+new Date(STATE.startDate).toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('stat-sessions').textContent=STATE.totalSessions;
  document.getElementById('stat-streak').textContent=streak;
  document.getElementById('stat-minutes').textContent=STATE.totalMinutes;
  document.getElementById('stat-week').textContent=Math.floor((new Date()-new Date(STATE.startDate))/(7*86400000))+1;
  var ni = document.getElementById('nickname-input');
  if(ni) ni.value = STATE.nickname || '';
  document.getElementById('badges-grid').innerHTML=ALL_BADGES.map(b=>{
    const e=STATE.earnedBadges.includes(b.id);
    return '<div class="badge-tile '+(e?'earned':'locked')+'">'+'<div class="badge-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><use href="#rf-i-'+b.icon+'"/></svg></div>'+'<div class="badge-name">'+b.name+'</div><div class="badge-desc">'+b.desc+'</div></div>';
  }).join('');
  const hl=document.getElementById('history-list');
  hl.innerHTML=STATE.history.length?STATE.history.slice(0,8).map(h=>`<div class="history-item"><div><div class="history-name">${h.name}</div><div class="history-date">${new Date(h.date).toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})}</div></div><div class="history-dur">${h.minutes} Min</div></div>`).join(''):'<div style="color:var(--muted);font-size:.82rem;padding:12px 0;">Noch keine Sessions — starte dein erstes Workout!</div>';
}

function togglePlanCard(slot){
  const list=document.getElementById('plist-'+slot);
  const chev=document.getElementById('chevron-'+slot);
  const open=list.style.display==='none';
  list.style.display=open?'block':'none';
  if(open)chev.classList.add('open'); else chev.classList.remove('open');
}

function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tabbar-btn').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='today')renderToday();
  if(name==='plan')renderPlan();
  if(name==='profile')renderProfile();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
supa.auth.onAuthStateChange(async function(event, session){
  if(session && session.user){
    currentUser = session.user;
    var nu = document.getElementById('nav-avatar');
    if(nu) nu.textContent = session.user.email.charAt(0).toUpperCase();
    // Always load from cloud first, THEN render
    await loadFromCloud();
    hideAuthScreen();
    advancePlan();
    renderToday();
  } else {
    currentUser = null;
    STATE = defaultState();
    showAuthScreen();
  }
});

// On page load: check session and load data before showing anything
document.addEventListener('DOMContentLoaded', async function(){
  try {
    var res = await supa.auth.getSession();
    if(res.data && res.data.session && res.data.session.user){
      currentUser = res.data.session.user;
      var nu = document.getElementById('nav-avatar');
      if(nu) nu.textContent = res.data.session.user.email.charAt(0).toUpperCase();
      await loadFromCloud();
      hideAuthScreen();
      advancePlan();
      renderToday();
    } else {
      showAuthScreen();
    }
  } catch(e){
    showAuthScreen();
  }
});

// ── FAVICON via canvas ────────────────────────────────────────────────────────
(function(){
  try {
    const c=document.createElement('canvas');
    c.width=c.height=64;
    const ctx=c.getContext('2d');
    const cx=32,cy=32;
    ctx.fillStyle='#1c1a17';
    ctx.fillRect(0,0,64,64);
    ctx.lineWidth=5; ctx.lineCap='round';
    ctx.strokeStyle='#d4a800';
    ctx.beginPath();
    ctx.arc(cx,cy*0.72,9,Math.PI,0,false);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx-9,cy*0.72);
    ctx.bezierCurveTo(cx-9,cy*1.1,cx+6,cy*0.95,cx+7,cy*1.22);
    ctx.stroke();
    ctx.strokeStyle='#f7f4ef';
    ctx.lineWidth=4.5;
    ctx.beginPath();
    ctx.moveTo(cx+9,cy*0.72);
    ctx.bezierCurveTo(cx+9,cy*1.1,cx-6,cy*0.95,cx-7,cy*1.22);
    ctx.stroke();
    document.getElementById('favicon').href=c.toDataURL('image/png');
    document.getElementById('apple-icon').href=c.toDataURL('image/png');
  } catch(e){}
})();
