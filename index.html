<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ROPE FLOW</title>

<!-- PWA: iOS Safari home screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rope Flow">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f4ef">

<!-- PWA icons inline as data URIs (generated via canvas) -->
<link rel="apple-touch-icon" id="apple-icon" href="">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" id="favicon" href="" type="image/png">

<style>
:root {
  --bg:       #f7f4ef;
  --bg2:      #f0ece4;
  --surface:  #ffffff;
  --border:   #e2ddd6;
  --border2:  #ccc8c0;
  --text:     #1c1a17;
  --text2:    #4a4740;
  --muted:    #9a9590;
  --accent:   #d4a800;
  --accent-bg:#fdfae8;
  --accent2:  #a07d00;
  --green:    #2a7a4a;
  --green-bg: #edf7f1;
  --blue:     #2c5f8a;
  --blue-bg:  #edf3f9;
  --shadow:   0 1px 4px rgba(28,26,23,.08), 0 4px 16px rgba(28,26,23,.06);
  --shadow-sm:0 1px 3px rgba(28,26,23,.07);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px; height: 58px;
  background: rgba(247,244,239,.95);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 200;
  backdrop-filter: blur(12px);
}
.logo { font-family:Georgia,'Times New Roman',serif; font-size:1.5rem; letter-spacing:.14em; color:var(--text); }
.logo b { color:var(--accent); }
.nav-tabs { display:flex; gap:4px; }
.nav-tab {
  background:none; border:none; color:var(--muted);
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; font-size:.72rem; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  padding:7px 14px; cursor:pointer; border-radius:0; transition:all .18s;
}
.nav-tab.active { color:var(--text); background:var(--surface); box-shadow:var(--shadow-sm); }
.nav-tab:hover:not(.active) { color:var(--text2); background:var(--bg2); }

.view { display:none; animation:fadeUp .28s ease; }
.view.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* TODAY */
.today-hero {
  padding:28px 20px 0;
  display:flex; justify-content:space-between; align-items:flex-start;
  gap:12px; flex-wrap:wrap;
}
.today-date { font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.today-title { font-family:Georgia,'Times New Roman',serif; font-size:clamp(2.6rem,8vw,4.5rem); line-height:.95; letter-spacing:.02em; }
.today-title em { color:var(--accent); font-style:normal; }
.streak-badge {
  background:var(--surface); border:1px solid var(--border);
  padding:12px 18px; text-align:center; border-radius:0;
  box-shadow:var(--shadow-sm); min-width:84px;
}
.streak-num { font-family:Georgia,'Times New Roman',serif; font-size:2.2rem; color:var(--accent2); line-height:1; }
.streak-label { font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:2px; }

.phase-bar {
  margin:20px 20px 0;
  background:var(--surface); border:1px solid var(--border); border-radius:0;
  padding:14px 18px; display:flex; justify-content:space-between;
  align-items:center; gap:16px; flex-wrap:wrap; box-shadow:var(--shadow-sm);
}
.phase-tag { font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:2px; }
.phase-name { font-size:.88rem; font-weight:600; }
.phase-progress-wrap { flex:1; min-width:120px; }
.phase-progress-label { font-size:.62rem; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
.phase-bar-track { height:3px; background:var(--bg2); border-radius:0; }
.phase-bar-fill { height:3px; background:var(--accent); border-radius:0; transition:width .6s ease; }

.workout-card {
  margin:14px 20px 0; background:var(--surface);
  border:1px solid var(--border); border-radius:0;
  box-shadow:var(--shadow); overflow:hidden;
}
.workout-card-header {
  padding:18px 20px; background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;
}
.workout-day-label { font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
.workout-name { font-family:Georgia,'Times New Roman',serif; font-size:1.5rem; letter-spacing:.04em; }
.workout-meta { font-size:.74rem; color:var(--muted); }

.exercise-item {
  display:flex; align-items:center; gap:14px;
  padding:14px 20px; border-bottom:1px solid var(--border); transition:background .14s;
}
.exercise-item:last-child { border-bottom:none; }
.exercise-item:hover { background:var(--bg); }
.exercise-item.done { opacity:.5; }
.exercise-item.done .ex-name { text-decoration:line-through; }
.ex-num { font-family:Georgia,'Times New Roman',serif; font-size:1.3rem; color:var(--border2); min-width:26px; line-height:1; }
.ex-body { flex:1; }
.ex-name { font-weight:600; font-size:.88rem; margin-bottom:2px; }
.ex-detail { font-size:.74rem; color:var(--muted); }
.ex-dur { font-size:.74rem; color:var(--accent2); white-space:nowrap; font-weight:500; }
.ex-check {
  width:22px; height:22px; border-radius:50%;
  border:2px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; flex-shrink:0;
}
.ex-check svg { width:12px; height:12px; }
.exercise-item.done .ex-check { background:var(--green); border-color:var(--green); color:#fff; }

.start-workout-btn {
  margin:14px 20px 20px; width:calc(100% - 40px);
  background:var(--accent); border:none; color:#1c1a17;
  font-family:Georgia,'Times New Roman',serif; font-size:1.2rem; letter-spacing:.1em;
  padding:16px; cursor:pointer; border-radius:0; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 3px 12px rgba(212,168,0,.25);
}
.start-workout-btn:hover { background:#a83808; box-shadow:0 4px 16px rgba(212,168,0,.35); }
.start-workout-btn:disabled { background:var(--bg2); color:var(--muted); cursor:default; box-shadow:none; }
.start-workout-btn.completed { background:var(--green); box-shadow:0 3px 12px rgba(42,122,74,.2); }

.rest-day-card {
  margin:14px 20px; background:var(--surface); border:1px solid var(--border);
  border-radius:0; padding:44px 24px; text-align:center; box-shadow:var(--shadow-sm);
}
.rest-icon { font-size:2.8rem; margin-bottom:14px; }
.rest-title { font-family:Georgia,'Times New Roman',serif; font-size:1.8rem; margin-bottom:8px; color:var(--green); letter-spacing:.04em; }
.rest-text { font-size:.83rem; color:var(--muted); line-height:1.65; max-width:280px; margin:0 auto; }

/* TIMER OVERLAY */
.timer-overlay {
  display:none; position:fixed; inset:0; z-index:300;
  background:var(--bg);
  flex-direction:column; align-items:center; justify-content:center;
  padding:32px 24px;
}
.timer-overlay.open { display:flex; animation:fadeUp .22s ease; }
.timer-ex-label { font-size:.66rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; text-align:center; }
.timer-ex-current { font-size:clamp(.9rem,3.5vw,1.2rem); font-weight:600; margin-bottom:28px; text-align:center; color:var(--text2); max-width:300px; }
.timer-phase-pill {
  padding:5px 18px; border-radius:0;
  font-size:.66rem; letter-spacing:.14em; text-transform:uppercase; font-weight:600;
  margin-bottom:20px; transition:all .3s;
}
.timer-phase-pill.work { background:var(--accent); color:#1c1a17; }
.timer-phase-pill.rest { background:var(--green-bg);  color:var(--green); }
.timer-phase-pill.prep { background:var(--blue-bg);   color:var(--blue); }
.timer-big {
  font-family:Georgia,'Times New Roman',serif;
  font-size:clamp(5.5rem,20vw,10rem); line-height:1; letter-spacing:.01em;
  margin-bottom:32px; transition:color .3s; color:var(--text);
}
.timer-big.work { color:var(--accent); }
.timer-big.rest { color:var(--green); }
.timer-big.prep { color:var(--blue); }
.timer-progress-wrap { width:100%; max-width:340px; margin-bottom:8px; }
.timer-progress-track { height:4px; background:var(--border); border-radius:0; }
.timer-progress-fill { height:4px; background:var(--accent); border-radius:0; transition:width .4s linear; }
.timer-rounds { font-size:.7rem; color:var(--muted); letter-spacing:.1em; text-align:center; margin-bottom:32px; margin-top:8px; }
.timer-btns { display:flex; gap:10px; margin-bottom:20px; }
.t-btn-main {
  background:var(--text); border:none; color:var(--bg);
  font-family:Georgia,'Times New Roman',serif; font-size:1.3rem; letter-spacing:.1em;
  padding:14px 44px; cursor:pointer; border-radius:0; transition:all .18s;
}
.t-btn-main:hover { background:var(--text2); }
.t-btn-sec {
  background:var(--surface); border:1px solid var(--border); color:var(--text2);
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; font-size:.76rem; letter-spacing:.08em;
  text-transform:uppercase; font-weight:500;
  padding:14px 20px; cursor:pointer; border-radius:0; transition:all .18s;
}
.t-btn-sec:hover { border-color:var(--border2); }
.timer-skip { font-size:.7rem; color:var(--muted); text-decoration:underline; cursor:pointer; letter-spacing:.06em; }
.timer-skip:hover { color:var(--text2); }
.timer-close-btn {
  position:absolute; top:18px; right:20px;
  background:var(--surface); border:1px solid var(--border); color:var(--text2);
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; font-size:.7rem; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  padding:6px 14px; border-radius:0; cursor:pointer; transition:all .18s;
}
.timer-close-btn:hover { border-color:var(--border2); color:var(--text); }

/* COMPLETE */
.complete-overlay {
  display:none; position:fixed; inset:0; z-index:400;
  background:var(--bg); flex-direction:column; align-items:center; justify-content:center;
  padding:32px 24px; text-align:center;
}
.complete-overlay.open { display:flex; animation:fadeUp .3s ease; }
.complete-icon { font-size:3.5rem; margin-bottom:20px; animation:pop .45s ease; }
@keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.15)} 100%{transform:scale(1)} }
.complete-title { font-family:Georgia,'Times New Roman',serif; font-size:clamp(2.8rem,9vw,5.5rem); line-height:.92; margin-bottom:12px; }
.complete-title span { color:var(--green); }
.complete-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:300px; margin:28px auto; }
.complete-stat { background:var(--surface); border:1px solid var(--border); padding:18px 14px; border-radius:0; box-shadow:var(--shadow-sm); }
.complete-stat-num { font-family:Georgia,'Times New Roman',serif; font-size:2rem; color:var(--accent2); line-height:1; }
.complete-stat-label { font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
.new-badge-wrap { margin:8px 0 16px; }
.new-badge-label { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
.new-badge-item { font-size:1.2rem; background:var(--surface); border:1px solid var(--accent); padding:8px 18px; display:inline-block; border-radius:0; margin:4px; }
.complete-btn {
  background:var(--green); border:none; color:#fff;
  font-family:Georgia,'Times New Roman',serif; font-size:1.2rem; letter-spacing:.1em;
  padding:14px 44px; cursor:pointer; border-radius:0; margin-top:16px;
  box-shadow:0 3px 12px rgba(42,122,74,.25); transition:background .18s;
}
.complete-btn:hover { background:#226040; }

/* PROFILE */
.profile-header { padding:28px 20px 0; display:flex; align-items:flex-start; gap:16px; }
.profile-avatar {
  width:64px; height:64px; background:var(--bg2); border:1px solid var(--border);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; flex-shrink:0;
}
.profile-name { font-family:Georgia,'Times New Roman',serif; font-size:1.8rem; letter-spacing:.04em; margin-bottom:2px; }
.profile-level { font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:5px; font-weight:600; }
.profile-since { font-size:.75rem; color:var(--muted); }

.stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin:20px 20px 0; }
@media(min-width:480px){ .stats-grid { grid-template-columns:repeat(4,1fr); } }
.stat-box { background:var(--surface); border:1px solid var(--border); padding:18px 16px; border-radius:0; box-shadow:var(--shadow-sm); }
.stat-num { font-family:Georgia,'Times New Roman',serif; font-size:2.2rem; line-height:1; }
.stat-num.orange { color:var(--accent2); }
.stat-num.green  { color:var(--green); }
.stat-num.red    { color:var(--accent); }
.stat-label { font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:4px; }

.section { margin:24px 20px 0; }
.section-title { font-size:.64rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); }

.badges-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:8px; }
.badge-item {
  background:var(--surface); border:1px solid var(--border);
  padding:14px 10px; text-align:center; border-radius:0;
  transition:all .2s; position:relative; box-shadow:var(--shadow-sm);
}
.badge-item.earned { border-color:#d4a84b; background:#fffbf3; }
.badge-item.earned:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(176,125,32,.15); }
.badge-icon { font-size:1.8rem; margin-bottom:6px; }
.badge-name { font-size:.65rem; font-weight:600; letter-spacing:.06em; color:var(--text2); margin-bottom:2px; }
.badge-desc { font-size:.58rem; color:var(--muted); line-height:1.4; }
.badge-locked { filter:grayscale(1); opacity:.35; }

.history-list { display:flex; flex-direction:column; gap:6px; }
.history-item {
  background:var(--surface); border:1px solid var(--border);
  padding:12px 16px; border-radius:0;
  display:flex; justify-content:space-between; align-items:center;
}
.history-date { font-size:.72rem; color:var(--muted); }
.history-name { font-size:.86rem; font-weight:600; }
.history-dur { font-size:.74rem; color:var(--accent2); font-weight:500; }

/* PLAN */
.plan-section { padding:24px 20px 0; }
.plan-section-title { font-family:Georgia,'Times New Roman',serif; font-size:1.6rem; letter-spacing:.04em; margin-bottom:14px; }
.week-strip { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:20px; }
.week-day {
  background:var(--surface); border:1px solid var(--border);
  padding:8px 4px; text-align:center;
  font-size:.58rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted);
  border-radius:0;
}
.week-day .wd-num { font-family:Georgia,'Times New Roman',serif; font-size:1.3rem; color:var(--border2); display:block; margin-top:1px; line-height:1; }
.week-day.today { border-top:3px solid var(--accent); background:var(--accent-bg); }
.week-day.today .wd-num { color:var(--accent); }
.week-day.done .wd-num { color:var(--green); }

.plan-cards { display:flex; flex-direction:column; gap:6px; padding-bottom:40px; }
.plan-day-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:0; box-shadow:var(--shadow-sm); overflow:hidden;
}
.plan-day-label { font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
.plan-day-title { font-weight:600; font-size:.9rem; margin-bottom:3px; }
.plan-day-exs { font-size:.72rem; color:var(--muted); }
.plan-day-tag { font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; padding:4px 10px; border-radius:0; white-space:nowrap; font-weight:600; }
.tag-technik { background:var(--blue-bg);   color:var(--blue); }
.tag-cardio  { background:var(--accent-bg); color:var(--accent); }
.tag-skills  { background:#f3f0fb; color:#6040b0; }
.tag-free    { background:var(--green-bg);  color:var(--green); }
.tag-rest    { background:var(--bg2); color:var(--muted); }
.plan-day-card { cursor:pointer; }
.plan-day-header { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:16px 18px; }
.plan-day-left {}
.plan-day-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
.plan-chevron { width:18px; height:18px; color:var(--muted); transition:transform .22s; }
.plan-chevron svg { width:100%; height:100%; }
.plan-chevron.open { transform:rotate(180deg); }
.plan-ex-list { border-top:1px solid var(--border); padding:4px 0 8px; }
.plan-ex-row {
  display:flex; flex-direction:column;
  padding:14px 18px; border-bottom:1px solid var(--border);
}
.plan-ex-row:last-child { border-bottom:none; }
.plan-ex-name { font-size:.85rem; font-weight:600; color:var(--text); margin-bottom:2px; }
.plan-ex-detail { font-size:.74rem; color:var(--muted); }
.plan-ex-meta { font-size:.74rem; color:var(--accent2); white-space:nowrap; font-weight:600; text-align:right; flex-shrink:0; }
.plan-ex-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; }
.plan-ex-tips { list-style:none; padding:0; margin:0; border-top:1px solid var(--border); padding-top:10px; display:flex; flex-direction:column; gap:5px; }
.plan-ex-tips li { font-size:.77rem; color:var(--text2); padding-left:14px; position:relative; line-height:1.45; }
.plan-ex-tips li::before { content:''; position:absolute; left:0; top:7px; width:5px; height:5px; border-radius:50%; background:var(--accent); flex-shrink:0; }


/* ── LOGIN SCREEN ── */
.auth-screen {
  display:none; position:fixed; inset:0; z-index:500;
  background:var(--bg);
  flex-direction:column; align-items:center; justify-content:center;
  padding:32px 24px;
}
.auth-screen.active { display:flex; }
.auth-logo { font-family:Georgia,'Times New Roman',serif; font-size:2.8rem; letter-spacing:.08em; margin-bottom:8px; color:var(--text); }
.auth-logo b { color:var(--accent); }
.auth-tagline { font-size:.8rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:48px; }
.auth-tabs { display:flex; width:100%; max-width:360px; margin-bottom:24px; border-bottom:2px solid var(--border); }
.auth-tab { flex:1; background:none; border:none; padding:12px; font-family:-apple-system,sans-serif; font-size:.85rem; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .18s; }
.auth-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.auth-form { width:100%; max-width:360px; display:flex; flex-direction:column; gap:12px; }
.auth-input {
  width:100%; padding:14px 16px;
  border:1px solid var(--border); background:var(--surface);
  font-family:-apple-system,sans-serif; font-size:.95rem; color:var(--text);
  outline:none; transition:border-color .18s;
}
.auth-input:focus { border-color:var(--accent); }
.auth-btn {
  width:100%; padding:16px;
  background:var(--accent); border:none; color:#1c1a17;
  font-family:Georgia,serif; font-size:1.1rem; letter-spacing:.08em;
  cursor:pointer; transition:background .18s; font-weight:700;
  margin-top:4px;
}
.auth-btn:hover { background:var(--accent2); color:#fff; }
.auth-btn:disabled { background:var(--bg2); color:var(--muted); cursor:default; }
.auth-msg { font-size:.8rem; text-align:center; min-height:20px; margin-top:4px; }
.auth-msg.error { color:#c0392b; }
.auth-msg.success { color:var(--green); }
.auth-divider { text-align:center; font-size:.75rem; color:var(--muted); margin:4px 0; }

/* User info in nav */
.nav-user { font-size:.65rem; color:var(--muted); letter-spacing:.08em; cursor:pointer; padding:4px 8px; }
.nav-user:hover { color:var(--text); }

/* Sync indicator */
.sync-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-left:6px; vertical-align:middle; }
.sync-dot.syncing { background:var(--accent); animation:pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.nav-user-wrap { display:flex; align-items:center; gap:6px; }
.nav-user-name { font-size:.72rem; color:var(--muted); letter-spacing:.06em; }
.signout-btn {
  margin-top:12px;
  background:none; border:1px solid var(--border);
  color:var(--muted); font-family:-apple-system,sans-serif;

async function syncToCloud(){
  if(!currentUser) return;
  setSyncDot('syncing');
  try{
    var check = await supa.from('Profiles').select('id').eq('user_id', currentUser.id).single();
    var res;
    if(check.data){
      res = await supa.from('Profiles').update({
        data: STATE,
        updated_at: new Date().toISOString()
      }).eq('user_id', currentUser.id);
    } else {
      res = await supa.from('Profiles').insert({
        user_id: currentUser.id,
        data: STATE,
        updated_at: new Date().toISOString()
      });
    }
    if(!res.error) setSyncDot('ok');
    else{ console.error('Sync error:', res.error); setSyncDot(''); }
  }catch(e){ console.error('Sync exception:', e); setSyncDot(''); }
}

async function loadFromCloud(){
  if(!currentUser){ STATE = defaultState(); return; }
  // Timeout after 5s — always proceed even if cloud fails
  var cloudDone = false;
  var timeoutPromise = new Promise(function(resolve){
    setTimeout(function(){ 
      if(!cloudDone) { STATE = defaultState(); }
      resolve(); 
    }, 5000);
  });
  var fetchPromise = (async function(){
    try{
      var res = await supa.from('Profiles').select('data').eq('user_id', currentUser.id).single();
      cloudDone = true;
      if(res.data && res.data.data){
        STATE = res.data.data;
        try{ localStorage.setItem('rope_v3', JSON.stringify(STATE)); }catch(e){}
      } else {
        STATE = defaultState();
      }
    }catch(e){
      cloudDone = true;
      try{
        var r = localStorage.getItem('rope_v3');
        STATE = r ? JSON.parse(r) : defaultState();
      }catch(e2){ STATE = defaultState(); }
    }
  })();
  await Promise.race([fetchPromise, timeoutPromise]);
}

  document.getElementById('auth-submit-btn').textContent = mode === 'login' ? 'ANMELDEN' : 'REGISTRIEREN';

}

async function authSubmit(){
  var email = document.getElementById('auth-email').value.trim();
  var password = document.getElementById('auth-password').value;
  var msg = document.getElementById('auth-msg');
  var btn = document.getElementById('auth-submit-btn');
  if(!email || !password){ msg.textContent='Bitte E-Mail und Passwort eingeben.'; msg.className='auth-msg error'; return; }
  btn.disabled = true;
  btn.textContent = '...';
  msg.textContent = '';

  try{
    var res;
    if(authMode === 'login'){
      res = await supa.auth.signInWithPassword({ email: email, password: password });
    } else {
      res = await supa.auth.signUp({ email: email, password: password });
    }
    if(res.error){
      msg.textContent = res.error.message;
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = authMode === 'login' ? 'ANMELDEN' : 'REGISTRIEREN';
    } else if(authMode === 'register' && !res.data.session){
      msg.textContent = 'Konto erstellt! Bitte jetzt anmelden.';
      msg.className = 'auth-msg success';
      btn.disabled = false;
      btn.textContent = 'REGISTRIEREN';
      setTimeout(function(){
        switchAuthTab('login', document.querySelector('.auth-tab'));
      }, 1500);
    } else if(res.data && res.data.session){
      // Login success — manually proceed instead of waiting for onAuthStateChange
      msg.textContent = 'Anmeldung erfolgreich...';
      msg.className = 'auth-msg success';
      currentUser = res.data.session.user;
      var nu = document.getElementById('nav-user-email');
      if(nu) nu.textContent = currentUser.email;
      await loadFromCloud();
      hideAuthScreen();
      advancePlan();
      renderToday();

    msg.textContent = 'Verbindungsfehler: ' + e.message;
    msg.className = 'auth-msg error';
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'ANMELDEN' : 'REGISTRIEREN';
  }

// TIMER
let T={exercises:[],exIdx:0,round:1,seconds:3,total:3,phase:'prep',running:false,interval:null,startTime:null,done:0};

function startWorkout(){
  const{template}=getTodayWorkout();
  T={exercises:getExercises(template.name),exIdx:0,round:1,seconds:3,total:3,phase:'prep',running:true,interval:null,startTime:Date.now(),done:0};
  document.getElementById('timer-overlay').classList.add('open');
  updateTimerUI();
  T.interval=setInterval(tick,1000);
  document.getElementById('t-main-btn').textContent='PAUSE';
}

function tick(){T.seconds--;if(T.seconds<=0)advance();updateTimerUI();}

function advance(){
  const ex=T.exercises[T.exIdx];
  if(T.phase==='prep'){T.phase='work';T.seconds=ex.work;T.total=ex.work;}
  else if(T.phase==='work'){
    if(T.round<ex.rounds){T.phase='rest';T.seconds=ex.rest;T.total=ex.rest;}
    else{T.done++;markExDone(T.exIdx);T.exIdx++;if(T.exIdx>=T.exercises.length){timerDone();return;}T.round=1;T.phase='prep';T.seconds=3;T.total=3;}
  }
  else{T.round++;T.phase='work';T.seconds=T.exercises[T.exIdx].work;T.total=T.exercises[T.exIdx].work;}
}

function updateTimerUI(){
  const ex=T.exercises[T.exIdx];if(!ex)return;
  const m=String(Math.floor(T.seconds/60)).padStart(2,'0'),s=String(T.seconds%60).padStart(2,'0');
  const d=document.getElementById('timer-big');
  d.textContent=T.phase==='prep'?String(T.seconds).padStart(2,'0'):`${m}:${s}`;
  d.className='timer-big '+T.phase;
  const pill=document.getElementById('timer-phase-pill');
  pill.className='timer-phase-pill '+T.phase;
  pill.textContent={prep:'Bereit',work:'Springen',rest:'Pause'}[T.phase];
  document.getElementById('t-ex-name').textContent=ex.name+' — '+ex.detail;
  document.getElementById('t-progress').style.width=(((T.total-T.seconds)/T.total)*100)+'%';
  document.getElementById('t-rounds').textContent=`Übung ${T.exIdx+1}/${T.exercises.length}`+(T.phase!=='prep'?` · Runde ${T.round}/${ex.rounds}`:'');
}

function markExDone(i){const el=document.getElementById('ex-item-'+i);if(el){el.classList.add('done');el.querySelector('.ex-check').innerHTML=ICONS.check;}}
function timerToggle(){
  if(T.running){clearInterval(T.interval);T.running=false;document.getElementById('t-main-btn').textContent='WEITER';document.getElementById('timer-phase-pill').textContent='Pausiert';}
  else{T.running=true;T.interval=setInterval(tick,1000);document.getElementById('t-main-btn').textContent='PAUSE';}
}function timerReset(){clearInterval(T.interval);T.phase='prep';T.seconds=3;T.total=3;T.exIdx=0;T.round=1;T.running=true;updateTimerUI();T.interval=setInterval(tick,1000);document.getElementById('t-main-btn').textContent='PAUSE';}
function timerNextExercise(){T.done++;markExDone(T.exIdx);T.exIdx++;if(T.exIdx>=T.exercises.length){timerDone();return;}T.round=1;T.phase='prep';T.seconds=3;T.total=3;updateTimerUI();}
function closeTimer(){clearInterval(T.interval);T.running=false;document.getElementById('timer-overlay').classList.remove('open');}

function timerDone(){
  clearInterval(T.interval);T.running=false;
  document.getElementById('timer-overlay').classList.remove('open');
  const mins=Math.max(1,Math.round((Date.now()-T.startTime)/60000));

      + '<div class="plan-day-right">'
      + '<div class="plan-day-tag ' + t.tagClass + '">' + t.tag + '</div>'
      + '<div class="plan-chevron" id="chevron-' + slot + '">' + chevronSVG + '</div>'
      + '</div>'
      + '</div>'
      + '<div class="plan-ex-list" id="plist-' + slot + '" style="display:none">'
      + (ex.length ? exRows : restRow)
      + '</div>'
      + '</div>';
  }).join('');
}

function renderProfile(){
  const streak=getStreak();STATE.streak=streak;
  const levels=['Blutiger Anfänger','Einsteiger','Schüler','Fortgeschrittener','Könner','Experte'];
  document.getElementById('profile-level-text').textContent=levels[Math.min(Math.floor(STATE.totalSessions/8),5)];
  document.getElementById('profile-since').textContent='Dabei seit '+new Date(STATE.startDate).toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('stat-sessions').textContent=STATE.totalSessions;
  document.getElementById('stat-streak').textContent=streak;
  document.getElementById('stat-minutes').textContent=STATE.totalMinutes;
  document.getElementById('stat-week').textContent=Math.floor((new Date()-new Date(STATE.startDate))/(7*86400000))+1;
  document.getElementById('badges-grid').innerHTML=ALL_BADGES.map(b=>{
    const e=STATE.earnedBadges.includes(b.id);
    return`<div class="badge-item${e?' earned':''}"><div class="badge-icon${e?'':' badge-locked'}">${ICONS[b.icon]||''}</div><div class="badge-name">${b.name}</div><div class="badge-desc">${b.desc}</div></div>`;
  }).join('');
  const hl=document.getElementById('history-list');
  hl.innerHTML=STATE.history.length?STATE.history.slice(0,8).map(h=>`<div class="history-item"><div><div class="history-name">${h.name}</div><div class="history-date">${new Date(h.date).toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})}</div></div><div class="history-dur">${h.minutes} Min</div></div>`).join(''):'<div style="color:var(--muted);font-size:.82rem;padding:12px 0;">Noch keine Sessions — starte dein erstes Workout!</div>';
}

function togglePlanCard(slot){
  const list=document.getElementById('plist-'+slot);
  const chev=document.getElementById('chevron-'+slot);
  const open=list.style.display==='none';
  list.style.display=open?'block':'none';
  if(open)chev.classList.add('open'); else chev.classList.remove('open');
}

function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='today')renderToday();
  if(name==='plan')renderPlan();
  if(name==='profile')renderProfile();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
supa.auth.onAuthStateChange(async function(event, session){
  if(session && session.user){
    currentUser = session.user;
    var nu = document.getElementById('nav-user-name');
    if(nu) nu.textContent = getDisplayName(session.user.email);
    // Always load from cloud first, THEN render
    await loadFromCloud();
    hideAuthScreen();
    advancePlan();
    renderToday();
  } else {
    currentUser = null;
    STATE = defaultState();
    showAuthScreen();
  }
});

// On page load: check session and load data before showing anything
document.addEventListener('DOMContentLoaded', async function(){
  try {
    var res = await supa.auth.getSession();
    if(res.data && res.data.session && res.data.session.user){
      currentUser = res.data.session.user;
      var nu = document.getElementById('nav-user-name');
      if(nu) nu.textContent = getDisplayName(res.data.session.user.email);
      await loadFromCloud();
      hideAuthScreen();
      advancePlan();
      renderToday();
    } else {
      showAuthScreen();
    }
  } catch(e){
    showAuthScreen();
  }
});

// ── FAVICON via canvas ────────────────────────────────────────────────────────
(function(){
  try {
    const c=document.createElement('canvas');
    c.width=c.height=64;
    const ctx=c.getContext('2d');
    const cx=32,cy=32;
    ctx.fillStyle='#1c1a17';
    ctx.fillRect(0,0,64,64);
    ctx.lineWidth=5; ctx.lineCap='round';
    ctx.strokeStyle='#d4a800';
    ctx.beginPath();
    ctx.arc(cx,cy*0.72,9,Math.PI,0,false);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx-9,cy*0.72);
    ctx.bezierCurveTo(cx-9,cy*1.1,cx+6,cy*0.95,cx+7,cy*1.22);
    ctx.stroke();
    ctx.strokeStyle='#f7f4ef';
    ctx.lineWidth=4.5;
    ctx.beginPath();
    ctx.moveTo(cx+9,cy*0.72);
    ctx.bezierCurveTo(cx+9,cy*1.1,cx-6,cy*0.95,cx-7,cy*1.22);
    ctx.stroke();
    document.getElementById('favicon').href=c.toDataURL('image/png');
    document.getElementById('apple-icon').href=c.toDataURL('image/png');
  } catch(e){}
})();
</script>
